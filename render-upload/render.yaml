services:
  - type: web
    name: ted-tio-songfestival-speelkopie
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ted-tio-songfestival-speelkopie-db
          property: connectionString

databases:
  - name: ted-tio-songfestival-speelkopie-db
    plan: free
